name: Build MelonLoader Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' 

    - name: Restore dependencies
      run: dotnet restore Main2.csproj

    - name: Build Mod (Release)
      run: dotnet build Main2.csproj --configuration Release --no-restore

    - name: Upload Compiled DLL
      uses: actions/upload-artifact@v4
      with:
        name: Issue Hack
        path: bin/Release/net6.0/IssueRecoded.dll
